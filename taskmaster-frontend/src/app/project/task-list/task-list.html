<div class="task-list-container">
    <div class="heading">
        <h3>Tasks</h3>
        <div>
            <span class="status-dot in-progress"></span>
            <span>In Progress</span>
            <span class="status-dot completed"></span>
            <span>Completed</span>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>Task</th>
                <th>Status</th>
                <th>Due Date</th>
            </tr>
        </thead>
        <tbody>
                @for(task of tasks; track task.id) {
            <tr>
                <td>
                    <label class="{{ task.completed ? 'completed-task' : '' }}">
                        <input type="checkbox" aria-label="Select task" [checked]="task.completed"
                        (click)="handlecheckbox(task.id)"/> {{ task.name }}
                    </label>
                </td>
                <td>
                    <span class="status-dot {{ task.completed ? 'completed' : 'in-progress' }}"></span>
                    {{ task.completed ? 'Completed' : 'In Progress' }}
                </td>
                <td class="due-date">
                    {{ task.dueDate | date:"yyyy-MM-dd" }}
                </td>
                <td (click)="deleteTask(task.id)">✕</td>
                <td (click)="updateTask(task)">✍️</td>
            </tr>
        }
        </tbody>
    </table>

    <div class = "button-container">
        <button (click)="openCreateModal()">Add New Task</button>
    </div>
    @if(showModal) {
    <app-task-form 
  [formType]="formType"
  [currentTask]="selectedTask"
  (closePanel)="handleModalClose($event); loadTasks()">
</app-task-form>
    }
</div>
