<div class="modal">
	<div class="modal-content">
		<form [formGroup]="taskForm" (ngSubmit)="handleSubmit()">
			<p>{{ formType === 'UPDATE' ? 'Update Task' : 'Add New Task' }}</p>
			<div>
				<label for="taskName">Task Name:</label>
				<input id="taskName" formControlName="name" />
				@if(taskForm.get('name')?.invalid && taskForm.get('name')?.touched) {
					<div class="error">Task name is required.</div>
				}

			</div>
			<div>
				<label for="task-description">Task Description:</label>
				<input id="task-description" formControlName="description" />
			</div>
			<div>
				<label for="due-date">Due Date:</label>
				<input id="due-date" type="date" formControlName="dueDate" />
				@if(taskForm.get('dueDate')?.invalid && taskForm.get('dueDate')?.touched) {
					<div class="error">Due date is required.</div>
				}

			</div>
			<div>
				<button class="cancel-button" type="button" (click)="handleCancel()">Cancel</button>
				<button class="add-button" type="submit" [disabled]="taskForm.invalid">Submit</button>
			</div>
		</form>
	</div>
</div>
